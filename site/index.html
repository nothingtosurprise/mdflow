    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@100..800&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['"Space Grotesk"', 'sans-serif'],
              mono: ['"JetBrains Mono"', 'monospace'],
            },
            colors: {
              cyan: {
                400: '#22d3ee',
                500: '#06b6d4',
              },
              orange: {
                400: '#fb923c',
                500: '#f97316',
                600: '#ea580c',
              },
              blue: {
                500: '#3b82f6',
                600: '#2563eb',
              },
              zinc: {
                950: '#09090b', // Deep black/gray
                900: '#18181b',
                850: '#202023',
              }
            },
            animation: {
              'cursor-blink': 'blink 1s step-end infinite',
              'scanline': 'scanline 8s linear infinite',
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'float': 'float 6s ease-in-out infinite',
            },
            keyframes: {
              blink: {
                '0%, 100%': { opacity: '1' },
                '50%': { opacity: '0' },
              },
              scanline: {
                '0%': { transform: 'translateY(-100%)' },
                '100%': { transform: 'translateY(100%)' },
              },
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-20px)' },
              }
            }
          },
        },
      }
    </script>
    <style>
      /* Kill double-tap smart-zoom (the tap easter eggs need clean taps)
         while keeping pinch-zoom for accessibility */
      html {
        touch-action: manipulation;
      }
      /* Never let decorative overflow (stretch canvases, entrance
         transforms, blur blobs) widen the layout viewport — on iOS that
         expansion shoves fixed-position chrome (the nav's audio toggle)
         past the screen edge. `clip` forbids even programmatic panning;
         `hidden` is the older-engine fallback. */
      html, body {
        overflow-x: hidden;
        overflow-x: clip;
      }
      /* Custom Scrollbar for Cyber Aesthetic */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #09090b; 
      }
      ::-webkit-scrollbar-thumb {
        background: #3f3f46; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #52525b; 
      }
      body {
        background-color: #050505;
        color: #e4e4e7;
      }
      
      /* Background Grid Pattern */
      .bg-grid {
        background-size: 50px 50px;
        background-image: linear-gradient(to right, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                          linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
        mask-image: linear-gradient(to bottom, black 40%, transparent 100%);
      }
      
      .text-glow {
        text-shadow: 0 0 20px rgba(249, 115, 22, 0.5);
      }

      /* When the WebGL guide layer is live (ShaderGuide adds .shader-fx),
         the EVOLVE glyphs become translucent windows and the mask-aligned
         aurora behind the content paints them. Without WebGL the word
         stays solid white. */
      html.shader-fx .evolve-live {
        color: rgba(244, 244, 245, 0.22);
      }
    </style>

}
</script>
