<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mdflow | Markdown agents that evolve</title>

    <!-- Open Graph / Social Media Meta Tags -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mdflow.dev/" />
    <meta property="og:title" content="mdflow | Markdown agents that evolve" />
    <meta property="og:description" content="A Git-native control plane for agent workflows. Define flows once, run them on the engine you already use, inspect inputs, and gate changes with evals." />
    <meta property="og:image" content="https://mdflow.dev/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://mdflow.dev/" />
    <meta name="twitter:title" content="mdflow | Markdown agents that evolve" />
    <meta name="twitter:description" content="A Git-native control plane for agent workflows. Any engine. Inspectable inputs. Eval-gated revisions." />
    <meta name="twitter:image" content="https://mdflow.dev/og-image.png" />

    <!-- General Meta -->
    <meta name="description" content="A Git-native control plane for agent workflows. Run markdown flows on claude, codex, pi, cursor-agent, copilot, agy, or any CLI engine; inspect context and gate prompt revisions with evals." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@100..800&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
      /* Kill double-tap smart-zoom (the tap easter eggs need clean taps)
         while keeping pinch-zoom for accessibility */
      html {
        touch-action: manipulation;
      }
      /* Never let decorative overflow (stretch canvases, entrance
         transforms, blur blobs) widen the layout viewport — on iOS that
         expansion shoves fixed-position chrome (the nav's audio toggle)
         past the screen edge. `clip` forbids even programmatic panning;
         `hidden` is the older-engine fallback. */
      html, body {
        overflow-x: hidden;
        overflow-x: clip;
      }
      /* Custom Scrollbar for Cyber Aesthetic */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #09090b; 
      }
      ::-webkit-scrollbar-thumb {
        background: #3f3f46; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #52525b; 
      }
      body {
        background-color: #050505;
        color: #e4e4e7;
      }
      
      /* Background Grid Pattern */
      .bg-grid {
        background-size: 50px 50px;
        background-image: linear-gradient(to right, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                          linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
        mask-image: linear-gradient(to bottom, black 40%, transparent 100%);
      }
      
      .text-glow {
        text-shadow: 0 0 20px rgba(249, 115, 22, 0.5);
      }

      /* When the WebGL guide layer is live (ShaderGuide adds .shader-fx),
         the EVOLVE glyphs become translucent windows and the mask-aligned
         aurora behind the content paints them. Without WebGL the word
         stays solid white. */
      html.shader-fx .evolve-live {
        color: rgba(244, 244, 245, 0.22);
      }
    </style>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
