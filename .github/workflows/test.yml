name: Test

on:
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck core and tests
        run: bun run typecheck

      - name: Run tests
        run: bun test
        env:
          CI: true

      - name: Check site facts are in sync
        run: bun run facts:check

      - name: Verify packed npm artifact
        run: bun run package:check

      - name: Install site dependencies
        working-directory: site
        run: bun install --frozen-lockfile

      - name: Typecheck and build site
        working-directory: site
        run: bun run verify
