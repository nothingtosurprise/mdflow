name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck core and tests
        run: bun run typecheck

      - name: Run tests
        run: bun test

      - name: Check site facts are in sync
        run: bun run facts:check

      - name: Verify packed npm artifact
        run: bun run package:check

      - name: Install site dependencies
        working-directory: site
        run: bun install --frozen-lockfile

      - name: Typecheck and build site
        working-directory: site
        run: bun run verify

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bunx semantic-release
